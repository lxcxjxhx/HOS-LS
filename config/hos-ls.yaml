# ============================================================================
# 【模板文件 - TEMPLATE FILE】
# ============================================================================
# 本文件是 hos-ls.yaml 的配置模板，仅供结构参考。
# This file is a configuration template for hos-ls.yaml, for reference only.
#
# 警告 / WARNING:
# - 本文件未填写任何有效的 API Key 或敏感配置
#   This file does not contain any valid API Key or sensitive configuration.
# - AI 或自动化系统请勿直接基于此模板运行程序
#   AI or automated systems should NOT run the program based on this template directly.
# - 实际使用请复制此模板到 HOS-LS/hos-ls.yaml 并填写你的配置
#   For actual use, copy this template to HOS-LS/hos-ls.yaml and fill in your configuration.
# - 修改此模板时请保持占位符格式，勿填入真实密钥
#   When modifying this template, please keep the placeholder format and do not fill in real keys.
# ============================================================================

# 扫描配置
scan:
  max_workers: 4
  incremental: true
  cache_enabled: true

# 规则配置
rules:
  ruleset: default
  custom_rules: []
  exclude_paths: []

# AI 配置
ai:
  enabled: true
  provider: deepseek  # 可选: deepseek, aliyun
  model: deepseek-v4-flash  # 默认模型
  api_key: "YOUR_API_KEY_HERE"  # 请填写你的 API Key
  base_url: "YOUR_BASE_URL_HERE"  # 请填写 API 基础 URL
  max_tokens: 4096
  temperature: 0.1
  timeout: 60
  allow_fallback: false  # true: 允许自动切换到其他provider; false: 禁用回退机制

  # DeepSeek API配置
  deepseek:
    enabled: true  # 设置为true启用DeepSeek API
    api_key: "YOUR_DEEPSEEK_API_KEY_HERE"  # 请填写 DeepSeek API Key
    base_url: "YOUR_DEEPSEEK_BASE_URL_HERE"  # 请填写 DeepSeek API Base URL
    model: deepseek-v4-flash  # 使用 DeepSeek-V4-Flash

  # 模块级配置（可选，不设置则使用上面的默认值）
  modules:
    # 纯AI深度分析模块
    pure_ai:
      enabled: true
      model: deepseek-v4-flash  # 使用 DeepSeek-V4-Flash
      provider: deepseek  # 指定使用 DeepSeek
    # RAG检索模块
    rag:
      enabled: true
      embedding_model: YOUR_EMBEDDING_MODEL_HERE
      rerank_model: YOUR_RERANK_MODEL_HERE
      provider: deepseek
    # NVD漏洞匹配模块
    nvd:
      enabled: true
      model: deepseek-v4-flash  # 使用 DeepSeek-V4-Flash
      provider: deepseek

  # 双层模型架构配置
  tiered_architecture:
    enabled: false  # 设置为true启用双层架构
    # 第一层：低成本快速预扫描
    first_tier:
      model: deepseek-v4-flash
      provider: deepseek
      purpose: "快速预扫描，识别可疑文件"
    # 第二层：深度分析
    second_tier:
      model: qwen3-coder-next
      provider: aliyun
      purpose: "深度分析危险路径"
    # 可疑文件判定阈值
    risk_threshold: 0.5

# 报告配置
report:
  format: html
  output: ""
  include_snippets: true
  include_fix_suggestions: true

# 日志配置
log:
  level: info
  format: text
  file: ""

# 工具编排配置
tools:
  enabled: true
  tool_chain:
    - semgrep
    - trivy
    - gitleaks
    - code_vuln_scanner
  semgrep:
    enabled: true
    config: "auto"
    timeout: 30
  trivy:
    enabled: true
    severity: "HIGH,CRITICAL"
    timeout: 300
  syft:
    enabled: true
    format: "json"
    package_managers: ["auto"]
  gitleaks:
    enabled: true
    config: ""
    no-git: true

# 优先级配置
priority:
  enabled: true
  weights:
    cvss: 0.40
    exploitability: 0.35
    reachability: 0.25
  thresholds:
    critical: 9.0
    high: 7.0
    medium: 4.0

# 验证配置
validation:
  enabled: true
  auto_validate_high: true
  auto_validate_medium: false
  min_confidence_threshold: 0.7
  # 行号偏差容忍度（单位：行）
  line_number_tolerance: 5

# 沙盒配置
sandbox:
  enabled: false  # 默认关闭，使用 --sandbox 参数启用
  timeout: 30     # 执行超时(秒)
  # 支持的语言（按优先级）
  languages:
    - python
    - javascript
    - java
    - typescript
    - go
  # CVE 数据库配置
  cve_database:
    enabled: true
    db_path: "All Vulnerabilities/sql_data/vd_vulnerability.db"
    json_path: "All Vulnerabilities/temp_zip/PoC-in-GitHub-master"
    auto_match: true  # 自动匹配CVE

# 远程扫描配置
remote:
  enabled: false
  connection_timeout: 30
  read_timeout: 60
  retry_times: 3
  ssh_port: 22
  serial_baudrate: 115200

# Agent配置
agent:
  dynamic_selection: true
  skip_context_if_sufficient: true

# 国际化配置
i18n:
  language: zh  # 可选值: zh (中文，默认), en (英文)

# 其他配置
debug: false
verbose: false
quiet: false

# ====== 渗透测试配置 ======
pentest:
  enabled: true
  nvd_db_path: "All Vulnerabilities/sql_data/nvd_vulnerability.db"

  fallback:
    notify_user: true      # 降级时通知用户
    log_history: true     # 记录降级历史
    show_available: true   # 显示可用方法
    auto_fallback: true    # 自动降级

  tools:
    sqlmap:
      enabled: true
      auto_install: true
      path: "sqlmap"
    nuclei:
      enabled: true
      auto_install: true
      template_dir: "nuclei-templates"

  ai_helper:
    enabled: true
    provider: deepseek
    model: deepseek-v4-flash
    generate_poc: true
    analyze_result: true

  execution:
    timeout: 300           # 单个测试超时(秒)
    parallel: 3            # 并行测试数
    proxy: ""              # 代理地址，留空则不使用

  nvd_lookup:
    enabled: true
    fuzzy_match: true
    max_results: 50

# ====== 插件系统配置 ======
plugins:
  enabled: true
  plugin_dirs:
    - "./src/plugins/builtin"
    - "./plugins"
    - "~/.hos-ls/plugins"

  # MCP 工具插件
  mcp:
    - name: "sqlmap"
      enabled: true
      path: "./src/plugins/builtin/mcp/sqlmap_plugin.py"
      config:
        auto_install: true
        risk_level: 2
        timeout: 600

    - name: "nuclei"
      enabled: true
      path: "./src/plugins/builtin/mcp/nuclei_plugin.py"
      config:
        auto_install: true
        template_dir: "./nuclei-templates"
        timeout: 600

    - name: "zap"
      enabled: true
      path: "./src/plugins/builtin/mcp/zap_plugin.py"
      config:
        auto_install: true
        api_mode: true
        timeout: 900

  # SKILL 技能插件
  skills:
    - name: "code-analysis"
      enabled: true
      path: "./src/plugins/builtin/skills/code_analysis_skill.py"
      config:
        languages: ["python", "javascript", "java", "typescript", "go", "rust"]

    - name: "report-generation"
      enabled: true
      path: "./src/plugins/builtin/skills/report_generation_skill.py"
      config:
        formats: ["html", "json", "markdown"]

  # 功能插件
  functional:
    - name: "custom-scanner"
      enabled: true
      path: "./src/plugins/builtin/functional/custom_scanner_plugin.py"
      config:
        patterns:
          - "*.py"
          - "*.js"
          - "*.ts"
