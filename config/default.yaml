# HOS-LS v3 默认配置文件

# AI 配置
ai:
  enabled: true
  provider: deepseek
  model: deepseek-chat
  api_key: sk-b235bbdc776f47c3bee2e8e8d4ec1232
  base_url: https://api.deepseek.com
  temperature: 0.0
  max_tokens: 4096
  timeout: 60

# 扫描配置
scan:
  max_workers: 4
  cache_enabled: true
  incremental: true
  timeout: 300
  max_file_size: 10485760  # 10MB
  exclude_patterns:
    - "*.min.js"
    - "*.min.css"
    - "node_modules/**"
    - "__pycache__/**"
    - ".git/**"
    - ".venv/**"
    - "venv/**"
    - "dist/**"
    - "build/**"
  include_patterns:
    - "*.py"
    - "*.js"
    - "*.ts"
    - "*.java"
    - "*.cpp"
    - "*.c"
    - "*.h"

# 函数级切片器配置
code_slicer:
  enabled: true
  max_slice_lines: 200
  include_context_lines: 10
  languages:
    - python
    - javascript
    - typescript

# 扫描调度器配置
scan_scheduler:
  enabled: true
  max_concurrent: 5
  max_retries: 3
  rate_limit: 10
  rate_limit_window: 60.0
  retry_delay: 1.0

# 多阶段扫描配置
multi_phase_scan:
  enabled: true
  phase1_max_tokens: 1024
  phase2_context_lines: 50

# 规则配置
rules:
  enabled: []
  disabled: []
  ruleset: default
  severity_threshold: low
  confidence_threshold: 0.5

# 报告配置
report:
  format: html
  output: ./security-report
  include_code_snippets: true
  include_fix_suggestions: true

# 数据库配置
database:
  url: sqlite:///hos-ls.db
  wal_mode: true
  pool_size: 5
  max_overflow: 10
  echo: false

# Neo4j 配置
neo4j:
  uri: neo4j://127.0.0.1:7687
  username: neo4j
  password: HOS@1234

# 沙箱配置
sandbox:
  enabled: true
  max_memory: 536870912  # 512MB
  max_cpu_time: 30
  network_access: false
  file_system_access: false

# NVD CVE 配置
nvd:
  enabled: true
  base_url: https://nvd.nist.gov/feeds/json/cve/1.1
  github_mirror_url: https://github.com/fkie-cad/nvd-json-data-feeds
  cache_dir: ~/.hos-ls/nvd_cache
  request_timeout: 60

# ExploitDB 配置
exploitdb:
  enabled: true
  repo_url: https://github.com/offensive-security/exploitdb.git
  local_dir: ~/.hos-ls/exploitdb

# CVE 同步管理器配置
cve_sync:
  enabled: true
  sync_interval_hours: 2
  full_sync_interval_days: 7
  nvd_enabled: true
  exploitdb_enabled: true
  state_file: ~/.hos-ls/cve_sync_state.json
  data_dir: ~/.hos-ls/cve_data

# 代理配置（7897端口）
proxy:
  enabled: true
  http_url: http://127.0.0.1:7897
  https_url: http://127.0.0.1:7897

# 批量处理配置
batch_processing:
  adaptive_batch_size:
    enabled: false  # 默认关闭
    min_batch_size: 16
    max_batch_size: 256
    memory_threshold: 0.8  # 内存使用阈值

# 全局配置
debug: true
verbose: true
quiet: false

# ========== Memory 系统配置（新增） ==========
memory:
  enabled: true
  storage_backend: json  # json | sqlite (未来支持)
  retention_days: 90  # 数据保留天数
  auto_backup: true
  backup_interval_hours: 24
  cache_ttl: 300  # 内存缓存有效期（秒）

# ========== Strategy Engine 配置（新增） ==========
strategy:
  enabled: true
  auto_mode: false  # 是否默认启用AI自动策略模式（可通过 --auto-strategy 或 strategy auto --on 开启）
  weights:
    user_preference: 0.4  # 用户偏好权重
    project_risk: 0.3     # 项目风险权重
    intent: 0.2           # 意图匹配权重
    history: 0.1          # 历史反馈权重
  ai_provider: default    # AI提供商（default表示使用ai.provider配置）
  ai_model: default       # AI模型（default表示使用ai.model配置）
  safety_constraints:
    max_time: 600         # 最大执行时间限制（秒）
    production_safe_mode: true  # 生产环境强制安全模式
  debug_output: true      # 是否显示决策过程（--debug时生效）

# ========== Feedback 反馈系统配置（新增） ==========
feedback:
  collect_auto: true      # 自动收集执行数据
  prompt_user: false      # 是否主动询问用户满意度（Chat模式下可开启）
  optimize_interval: 50   # 每N次执行后触发一次权重优化
  min_samples: 10         # 最小样本数要求
