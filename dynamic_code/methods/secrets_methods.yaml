methods:
  secrets_hardcoded:
    id: secrets_hardcoded
    name: 硬编码凭证验证
    vuln_type: secrets
    pattern: "(password|secret|api_key|token)\\s*=\\s*[\"'][^\"']+[\"']"
    confidence_level: high

    validation:
      type: code_analysis
      steps:
        - detect_hardcoded_secrets
        - classify_secret_type
        - evaluate_exposure_risk
        - check_version_control

    poc_template: |
      def verify_hardcoded_secret(file_path, secret_type):
          """
          验证硬编码凭证

          注意: 此验证仅检测代码中的硬编码，不实际利用
          """
          patterns = {
              'password': r'password\s*=\s*["\']([^"\']+)["\']',
              'api_key': r'api_key\s*=\s*["\']([^"\']+)["\']',
              'token': r'token\s*=\s*["\']([^"\']+)["\']',
          }

          findings = []
          if secret_type in patterns:
              matches = re.findall(patterns[secret_type], open(file_path).read())
              for match in matches:
                  findings.append({
                      'secret_type': secret_type,
                      'value_preview': match[:4] + '***',
                      'exposed': True
                  })

          return {
              'is_exploitable': len(findings) > 0,
              'evidence': findings
          }

    evidence_required:
      - secret_location
      - secret_type

  secrets_config_stored:
    id: secrets_config_stored
    name: 配置文件凭证验证
    vuln_type: secrets
    pattern: "\\.(properties|yml|yaml|conf)$"
    confidence_level: medium

    validation:
      type: config_analysis
      steps:
        - scan_config_files
        - identify_secret_entries
        - check_encryption
        - evaluate_config_exposure

    poc_template: |
      def verify_config_stored_secret(config_path):
          """
          验证配置文件中的凭证存储

          注意: 此验证仅检查配置内容
          """
          secret_patterns = [
              r'password\s*=\s*([^\s]+)',
              r'secret\s*=\s*([^\s]+)',
              r'api-key\s*=\s*([^\s]+)',
          ]

          findings = []
          try:
              with open(config_path, 'r') as f:
                  content = f.read()
                  for pattern in secret_patterns:
                      matches = re.findall(pattern, content)
                      for match in matches:
                          findings.append({
                              'pattern': pattern,
                              'value_preview': match[:4] + '***'
                          })
          except Exception:
              pass

          return {
              'is_exploitable': len(findings) > 0,
              'evidence': findings
          }

    evidence_required:
      - config_file
      - secret_entries

  secrets_database_config:
    id: secrets_database_config
    name: 数据库配置凭证验证
    vuln_type: secrets
    pattern: "(jdbc|datasource|mysql|postgres|oracle).*url"
    confidence_level: low

    validation:
      type: config_analysis
      steps:
        - identify_database_config
        - check_connection_string
        - verify_secure_storage
        - evaluate_exposure

    poc_template: |
      def verify_database_config(config_path):
          """
          验证数据库配置安全性

          检查:
          1. 连接字符串是否包含明文密码
          2. 是否使用安全存储
          3. 是否配置了最小权限
          """
          jdbc_pattern = r'jdbc:[^\s;]+;.*password=([^\s;]+)'

          findings = []
          try:
              with open(config_path, 'r') as f:
                  content = f.read()
                  matches = re.findall(jdbc_pattern, content, re.IGNORECASE)
                  for match in matches:
                      findings.append({
                          'has_password': True,
                          'value_preview': match[:4] + '***',
                          'risk': 'plaintext_password'
                      })
          except Exception:
              pass

          return {
              'is_exploitable': len(findings) > 0,
              'evidence': findings
          }

    evidence_required:
      - connection_string
      - database_type
