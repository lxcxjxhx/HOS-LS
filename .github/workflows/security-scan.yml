name: HOS-LS Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 0'  # 每周日运行

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd HOS-LS
        pip install -r requirements.txt
    
    - name: Run HOS-LS Security Scan (Smart Mode)
      run: |
        cd HOS-LS
        python src/main.py --smart-scan -o json --output-dir reports
    
    - name: Run HOS-LS AI Security Check
      run: |
        cd HOS-LS
        python src/main.py --rule-set ai_security -o json --output-dir reports
    
    - name: Upload security scan results
      uses: actions/upload-artifact@v3
      with:
        name: security-scan-results
        path: HOS-LS/reports
        retention-days: 7
    
    - name: Check for high-risk vulnerabilities
      run: |
        cd HOS-LS
        if [ -f "reports/*.json" ]; then
          HIGH_RISK=$(jq '.risk_stats.high' reports/*.json)
          if [ "$HIGH_RISK" -gt 0 ]; then
            echo "::error ::High-risk vulnerabilities found: $HIGH_RISK"
            exit 1
          fi
        fi
