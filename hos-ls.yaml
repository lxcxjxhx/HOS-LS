# HOS-LS 配置文件

# 扫描配置
scan:
  max_workers: 4
  incremental: true
  cache_enabled: true

# 规则配置
rules:
  ruleset: default
  custom_rules: []
  exclude_paths: []

# AI 配置
ai:
  enabled: false
  provider: deepseek
  model: deepseek-chat  # 正确的 DeepSeek 模型名称
  api_key: "sk-b235bbdc776f47c3bee2e8e8d4ec1232"
  base_url: "https://api.deepseek.com"
  max_tokens: 4096
  temperature: 0.0
  timeout: 60

# 报告配置
report:
  format: html
  output: ""
  include_snippets: true
  include_fix_suggestions: true

# 日志配置
log:
  level: info
  format: text
  file: ""

# 其他配置
debug: false
verbose: false
quiet: false
