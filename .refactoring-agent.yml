# Refactoring Agent Configuration
# https://pypi.org/project/refactoring-agent/

# 扫描路径配置
scan_paths:
  - src/
  - tests/

# 忽略路径
ignore_paths:
  - .venv/
  - venv/
  - __pycache__/
  - .git/
  - .mypy_cache/
  - .pytest_cache/
  - build/
  - dist/
  - "*.egg-info/"

# 重构规则配置
refactor_rules:
  # 代码质量规则
  quality:
    enabled: true
    remove_unused_imports: true
    remove_unused_variables: true
    simplify_expressions: true

  # 代码风格规则
  style:
    enabled: true
    consistent_naming: true
    remove_redundant_pass: true

  # 性能优化规则
  performance:
    enabled: true
    optimize_loops: true
    use_list_comprehension: true

# AI 辅助配置
ai_assistance:
  enabled: true
  # 使用已配置的 LLM 提供商
  provider: auto
  # 自动提交建议
  auto_commit: false
  # 生成重构说明
  generate_explanation: true

# 输出配置
output:
  # 生成报告格式
  report_format: markdown
  # 报告输出路径
  report_path: ./refactoring_reports/
  # 详细日志
  verbose: true

# Git 集成
git:
  # 自动创建分支
  auto_branch: true
  # 分支命名模式
  branch_pattern: refactor/{timestamp}
  # 自动提交
  auto_commit: false
  # 提交信息模板
  commit_message_template: |
    refactor: {summary}

    {description}

    Generated by refactoring-agent
