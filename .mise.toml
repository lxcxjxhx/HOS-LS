[tools]
# Go 安全工具（projectdiscovery 生态）
"go:nuclei" = "v3.4.1"
"go:httpx" = "v1.6.7"
"go:ffuf" = "v2.1.0"
"go:subfinder" = "v2.6.7"
"go:katana" = "v1.1.2"
"go:dnsx" = "v1.2.2"
"go:naabu" = "v2.2.5"
"go:tlsx" = "v1.2.1"

# Python 安全工具
"pipx:sqlmap" = "latest"
"pipx:garak" = "latest"

# 系统工具（手动安装，仅版本提示）
[env]
_NMAP_VERSION = "7.95"
_NIKTO_VERSION = "2.5.0"

# 自动安装钩子
[tasks.setup]
run = ["mise install", "python -m src.pentest.tools.package_manager sync"]
description = "安装所有安全工具到指定版本"

[tasks.health]
run = ["python -m src.pentest.tools.package_manager health-check"]
description = "检查所有工具健康状态"